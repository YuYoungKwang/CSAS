spring:
  application:
    name: crack-sensing-ai-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

aws:
  region: ${AWS_REGION:ap-northeast-2}

s3:
  bucket-name: ${S3_BUCKET_NAME}

opensearch:
  endpoint: ${OPENSEARCH_ENDPOINT:}
  region: ${OPENSEARCH_REGION:ap-northeast-2}
  service: ${OPENSEARCH_SERVICE:es}
  index-name: ${OPENSEARCH_INDEX_NAME:crack-analysis-results}

ai:
  base-url: ${AI_BASE_URL:}
  analyze-path: ${AI_ANALYZE_PATH:/api/analyze}

google:
  client-id: ${GOOGLE_CLIENT_ID:}

server:
  port: 8080
