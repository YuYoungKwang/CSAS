spring:
  application:
    name: crack-sensing-ai-service
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

aws:
  region: ${AWS_REGION:ap-northeast-2}

s3:
  bucket-name: ${S3_BUCKET_NAME}

weaviate:
  url: ${WEAVIATE_URL:}
  api-key: ${WEAVIATE_API_KEY:}
  collection: ${WEAVIATE_COLLECTION:CrackAnalysis}

ai:
  base-url: ${AI_BASE_URL:}
  analyze-path: ${AI_ANALYZE_PATH:/api/analyze}

google:
  client-id: ${GOOGLE_CLIENT_ID:}

server:
  port: 8080
