name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: "533267330483"
  EKS_CLUSTER_NAME: crack-sensing
  ECR_REGISTRY: 533267330483.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Ensure ECR repositories
        run: |
          aws ecr describe-repositories --repository-names csas-backend --region $AWS_REGION >/dev/null 2>&1 || aws ecr create-repository --repository-name csas-backend --region $AWS_REGION --image-tag-mutability IMMUTABLE
          aws ecr describe-repositories --repository-names csas-frontend --region $AWS_REGION >/dev/null 2>&1 || aws ecr create-repository --repository-name csas-frontend --region $AWS_REGION --image-tag-mutability IMMUTABLE

      - name: Build and push backend image
        run: |
          docker build -t $ECR_REGISTRY/csas-backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/csas-backend:$IMAGE_TAG

      - name: Build and push frontend image
        run: |
          docker build --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" -t $ECR_REGISTRY/csas-frontend:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/csas-frontend:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Validate required secrets
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
        run: |
          test -n "$S3_BUCKET_NAME"
          test -n "$GOOGLE_CLIENT_ID"
          test -n "$WEAVIATE_API_KEY"

      - name: Apply runtime secrets
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
        run: |
          kubectl create secret generic backend-secrets \
            --from-literal=S3_BUCKET_NAME="$S3_BUCKET_NAME" \
            --from-literal=GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            --from-literal=WEAVIATE_API_KEY="$WEAVIATE_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/weaviate.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml

      - name: Update deployment images
        run: |
          kubectl set image deployment/backend backend=$ECR_REGISTRY/csas-backend:$IMAGE_TAG
          kubectl set image deployment/frontend frontend=$ECR_REGISTRY/csas-frontend:$IMAGE_TAG

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend
          kubectl rollout status deployment/frontend
