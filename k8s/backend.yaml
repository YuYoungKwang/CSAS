apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 533267330483.dkr.ecr.ap-northeast-2.amazonaws.com/csas-backend:22d3dee-13-1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              value: ap-northeast-2
            - name: AI_BASE_URL
              value: http://python:8000
            - name: AI_ANALYZE_PATH
              value: /api/analyze
            - name: WEAVIATE_URL
              value: http://weaviate:8080
            - name: WEAVIATE_COLLECTION
              value: CrackAnalysis
            - name: WEAVIATE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: WEAVIATE_API_KEY
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: S3_BUCKET_NAME
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GOOGLE_CLIENT_ID
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
