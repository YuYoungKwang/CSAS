apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 533267330483.dkr.ecr.ap-northeast-2.amazonaws.com/csas-backend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              value: ap-northeast-2
            - name: CLASSIFIER_BASE_URL
              value: http://python:8000
            - name: OPENSEARCH_SERVICE
              value: es
            - name: OPENSEARCH_INDEX_NAME
              value: crack-analysis-results
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: S3_BUCKET_NAME
            - name: OPENSEARCH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPENSEARCH_ENDPOINT
            - name: OPENSEARCH_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPENSEARCH_REGION
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GOOGLE_CLIENT_ID
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
